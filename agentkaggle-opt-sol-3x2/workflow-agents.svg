<!-- Title -->
<text x="44" y="46" font-size="25" font-weight="700" fill="#202124">AgentKaggle · agent-level workflow — implementation and search lanes</text>
<text x="44" y="76" font-size="14" fill="#5f6368">Serial agent view of the stable 117-node workflow. Deterministic scripts are grouped into compact service bars.</text>
<text x="44" y="99" font-size="14" fill="#5f6368">The coordinator is global; A/B/C are three asynchronous instances of the same implementation lane.</text>

